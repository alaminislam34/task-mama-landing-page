name: Deploy task-mama-landing-page to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-task-mama-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
        run: |
          set -e
          [ -n "$EC2_HOST" ] || { echo "Missing GitHub secret: EC2_HOST"; exit 1; }
          [ -n "$EC2_USER" ] || { echo "Missing GitHub secret: EC2_USER"; exit 1; }
          [ -n "$EC2_SSH_KEY" ] || { echo "Missing GitHub secret: EC2_SSH_KEY"; exit 1; }
          [ -n "$DOCKERHUB_USERNAME" ] || { echo "Missing GitHub secret: DOCKERHUB_USERNAME"; exit 1; }
          [ -n "$DOCKERHUB_TOKEN" ] || { echo "Missing GitHub secret: DOCKERHUB_TOKEN"; exit 1; }
          [ -n "$NEXT_PUBLIC_APP_URL" ] || { echo "Missing GitHub secret: NEXT_PUBLIC_APP_URL"; exit 1; }
          [ -n "$NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY" ] || { echo "Missing GitHub secret: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY"; exit 1; }
          [ -n "$NEXT_PUBLIC_GOOGLE_CLIENT_ID" ] || { echo "Missing GitHub secret: NEXT_PUBLIC_GOOGLE_CLIENT_ID"; exit 1; }

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskmama-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/taskmama-app:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}

      - name: Deploy Docker container on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            APP_NAME="taskmama-app-prod"
            APP_IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/taskmama-app:latest"
            APP_PORT="3000"

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker is not installed on EC2. Please install Docker first."
              exit 1
            fi

            if [ ! -f /home/ubuntu/task-mama-landing-page/.env ]; then
              echo "Missing /home/ubuntu/task-mama-landing-page/.env on EC2"
              exit 1
            fi

            docker pull "$APP_IMAGE"
            docker rm -f "$APP_NAME" 2>/dev/null || true

            PORT_CONTAINERS="$(docker ps -q --filter "publish=${APP_PORT}")"
            if [ -n "$PORT_CONTAINERS" ]; then
              docker rm -f $PORT_CONTAINERS || true
            fi

            sleep 2

            if command -v ss >/dev/null 2>&1 && ss -ltn | grep -q ":${APP_PORT} "; then
              echo "Port ${APP_PORT} is still in use."
              docker ps --format "table {{.ID}}\t{{.Names}}\t{{.Ports}}" || true
              sudo lsof -iTCP:${APP_PORT} -sTCP:LISTEN || true
              exit 1
            fi

            docker run -d \
              --name "$APP_NAME" \
              --restart unless-stopped \
              -p ${APP_PORT}:3000 \
              --env-file /home/ubuntu/task-mama-landing-page/.env \
              "$APP_IMAGE"

            docker image prune -f || true
            sudo systemctl restart nginx || true
