name: Deploy task-mama-landing-page to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-task-mama-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -e
          [ -n "$EC2_HOST" ] || { echo "Missing GitHub secret: EC2_HOST"; exit 1; }
          [ -n "$EC2_USER" ] || { echo "Missing GitHub secret: EC2_USER"; exit 1; }
          [ -n "$EC2_SSH_KEY" ] || { echo "Missing GitHub secret: EC2_SSH_KEY"; exit 1; }

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          # নিচে দেখুন, script এখন with এর ভেতরে এবং সঠিক স্পেসিংয়ে আছে
          script: |
            set -e

            # ফোল্ডারে ঢোকা
            cd /home/ubuntu/task-mama-landing-page

            # কোড আপডেট করা
            git fetch --all
            git checkout main
            git reset --hard origin/main

            # nvm ও node পাথ লোড করা
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # pnpm চেক ও ইনস্টল
            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm
            fi

            # ডিপ্লয়মেন্ট
            pnpm install
            pnpm build

            # PM2 ম্যানেজমেন্ট
            if pm2 describe taskmama-landing >/dev/null 2>&1; then
              pm2 restart taskmama-landing --update-env
            else
              pm2 start node_modules/next/dist/bin/next --name "taskmama-landing" -- start
            fi

            pm2 save
