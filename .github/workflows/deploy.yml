name: Deploy task-mama-landing-page to EC2

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-task-mama-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          set -e
          [ -n "$EC2_HOST" ] || { echo "Missing GitHub secret: EC2_HOST"; exit 1; }
          [ -n "$EC2_USER" ] || { echo "Missing GitHub secret: EC2_USER"; exit 1; }
          [ -n "$EC2_SSH_KEY" ] || { echo "Missing GitHub secret: EC2_SSH_KEY"; exit 1; }

      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e

            # ১. প্রজেক্ট ফোল্ডারে ঢোকা
            cd /home/ubuntu/task-mama-landing-page

            # ২. লেটেস্ট কোড পুল করা
            git fetch --all
            git checkout main
            git reset --hard origin/main

            # ৩. এনভায়রনমেন্ট (Node, pnpm, pm2) পাথ লোড করা
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # ৪. pnpm চেক ও ইনস্টল নিশ্চিত করা
            if ! command -v pnpm >/dev/null 2>&1; then
              npm install -g pnpm
            fi

            # ৫. ডিপেন্ডেন্সি ইনস্টল ও প্রজেক্ট বিল্ড
            pnpm install
            pnpm build

            # ৬. PM2 পাথ ডিটেক্ট করা (যাতে ১২৭ এরর না আসে)
            # অনেক সময় pnpm global bin সরাসরি পাথে থাকে না
            PM2_BIN=$(which pm2 || echo "$HOME/.local/share/pnpm/pm2")

            # ৭. PM2 দিয়ে প্রজেক্ট রিস্টার্ট বা স্টার্ট করা
            if $PM2_BIN describe taskmama-landing >/dev/null 2>&1; then
              echo "Restarting existing process..."
              $PM2_BIN restart taskmama-landing --update-env
            else
              echo "Starting new process..."
              $PM2_BIN start node_modules/next/dist/bin/next --name "taskmama-landing" -- start
            fi

            # ৮. রিবুট হলেও যেন অটো-স্টার্ট হয়
            $PM2_BIN save
